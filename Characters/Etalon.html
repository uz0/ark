        <td style="vertical-align:top;">
          <p>Эталон — живое воплощение имперского триумфа, венец секретной программы по созданию совершенного человека, сочетающий в себе функции суперсолдата и религиозного символа.&nbsp;</p>
          <p>Его облик монументален: двухметровый атлет в сегментированном белом костюме и золотой броне, чья идеально симметричная внешность и холодное спокойствие напоминают ожившую античную статую.</p>
          <p>Он не просто боевая единица, а «дирижер войны», чье присутствие на поле боя должно подавлять волю врага и вдохновлять подданных. Каждое его движение выверено алгоритмами, а взгляд светящихся глаз транслирует надменное превосходство существа, стоящего на вершине эволюционной иерархии.</p>
          <h5>Суперсилы и технологии</h5>
          <p>Мощь Эталона базируется на взаимодействии его разума с полем Макфаддена через уникальные морфоритовые резонаторы — шесть гибких трубок, выходящих из спинного блока. Эти щупальца из<br>живого металла служат ему одновременно абсолютным оружием, щитом и сенсорной сетью, способной считывать страх и ложь противника.</p>
          <p>Обладает точным телекинезом, способен левитировать за счет гравитационных стабилизаторов.</p>
        </td>

          <h5>Общие сведения</h5>
          <p>Программа <i>«Эталон»</i> запущена в <strong>Летающей лаборатории</strong> в первый год войны с Северными Республиками.</p>
          <p>Задача проекта — создание самообучающегося субъекта, способного выполнять функции дивизии без участия человека-оператора.</p>
          <p>Каждый экземпляр Эталона выращивался <strong>в индивидуальной капсуле</strong> с искусственным формированием сознания на основе <strong>нейрошаблона проф. Чижевского</strong>, дополненного пакетом ложных биографических воспоминаний и эмоциональных якорей патриотизма.</p>
          <p>После активации одной особи процесс клонирования следующей запускался автоматически — обеспечивая непрерывную преемственность опыта.&lt;/details&gt;</p>
        </td>
      </tr>

        <td>
          <h5><strong>Непредусмотренные реакции:</strong></h5>
          <p>Начиная с второй серии зафиксирована устойчивая тенденция к <strong>развитию ксенофобии и презрения к людям</strong>. Эти реакции не были заложены при программировании и формировались спонтанно.</p>
          <p>Субъекты начинали воспринимать обычных людей как “грязных”, “низших”, “энергетически искажённых”. Проявлялось <strong>отвращение к физическому контакту</strong> — Эталоны отказывались позволять техникам прикасаться к ним, особенно во время диагностического обслуживания.</p>
          <p>Для поддержания функционирования проекта рассматривались два варианта:</p>
          <p><strong>1. Психокоррекция.</strong></p>
          <p>Попытки изменить базовую нейроструктуру с целью подавления высокомерия и ксенофобии.<br>Результат: неудачный. Возникали сбои, амнезии, агрессия.</p>
          <p><strong>2. Создание подчинённых копий.</strong></p>
          <p>Разработка вторичной линии биоклонов — <strong>клонов-слуг</strong>, выращенных по тому же физическому шаблону, но с урезанным интеллектом и полным отсутствием индивидуальности.&nbsp;<br>Эталоны воспринимали таких клонов как «часть себя» и <strong>допускали к телесному контакту</strong>, обслуживанию и совместному пребыванию в пространстве.</p>
          <blockquote>
            <p>С этого момента введён протокол “<strong>Щитоносец”</strong>: каждому активному Эталону прикреплялась группа из 3–6 клонов, выполнявших функции техники, адъютантов и телохранителей.</p>
          </blockquote>
          <p>Таким образом, проект сохранил стабильность без вмешательства живых людей.</p>

          <h5>Заключение</h5>
          <p>Несмотря на различия в настройках, <strong>во всех сериях проявляется один и тот же паттерн</strong>: стремление к автономии и презрение к человеческим чертам. Это указывает на то, что само ядро сознания (матрица Чижевского) содержит латентную склонность к самообожествлению. Попытки усилить контроль (через ограничители или телепатические блоки) приводят к парадоксальному эффекту — усилению самосознания. Чем сильнее подавляется личность, тем активнее она стремится доказать своё существование.</p>
          <p>Введение клонов-слуг позволило стабилизировать рабочие параметры проекта, но фактически закрепило статус Эталонов как <strong>замкнутых существ, общающихся только с собственными отражениями</strong>. Это создало идеальную среду для формирования культа самости.</p>
          <p>В случае дальнейшего использования проекта рекомендовано:</p>
          <ul>
            <li>ограничить телепатический радиус действия (до 1,5 км),</li>
            <li>ввести фильтр восприятия эмоций людей (чтобы снизить отвращение),</li>
            <li>периодически “обнулять” память и заново внедрять патриотические блоки.</li>
          </ul>
          <p><i><strong>Подписи:</strong></i><br><i>Проф. А. Л. Чижевский — Руководитель проекта</i><br><i>Анна В. Крылова — Главный куратор</i><br><i>Копия направлена: Канцлеру Клементию К. Демидову</i></p>
          <blockquote>
            <p><strong>Примечание </strong><i><strong>Проф. А. Л. Чижевского</strong></i><strong>:</strong><br>&nbsp;«Эталон — это не человек. Это воля Империи, облеченная в золото. Относитесь к нему как к оружию, а не как к коллеге».</p>
